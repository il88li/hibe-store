<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="csrf-token" content="{{ csrf_token }}">
    <title>HIBE STORE | المتجر الرئيسي</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #1a73e8;
            --light-blue: #e8f0fe;
            --glass-white: rgba(255,255,255,0.7);
            --glass-blue: rgba(26,115,232,0.15);
            --text-dark: #1a1a2e;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #f0f4ff 0%, #e6edf8 100%);
            padding-bottom: 70px;
        }
        .app-container { max-width: 550px; margin: 0 auto; padding: 0 12px; }
        .glass-navbar {
            background: var(--glass-white);
            backdrop-filter: blur(14px);
            border-radius: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            margin: 10px 8px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .brand { font-size: 1.3rem; font-weight: 800; color: var(--primary-blue); }
        .theme-icon-btn {
            background: var(--glass-blue);
            border: none;
            width: 34px; height: 34px;
            border-radius: 8px;
            font-size: 1.1rem;
            cursor: pointer;
            color: var(--primary-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .hero-section {
            position: relative;
            height: 50vh;
            max-height: 420px;
            min-height: 220px;
            margin: 8px 8px 14px 8px;
            border-radius: 14px;
            overflow: hidden;
            background-image: url('https://images.unsplash.com/photo-1441984904996-e0b6ba687e04?w=1200&q=80');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px 16px;
            transition: opacity 0.3s ease, max-height 0.3s ease, margin 0.3s ease, padding 0.3s ease;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 1;
            border-radius: 14px;
        }
        .hero-section * { position: relative; z-index: 2; }
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 4px 20px rgba(0,0,0,0.4);
            margin-bottom: 8px;
        }
        .hero-title span { color: #ffd700; }
        .hero-subtitle {
            font-size: 0.9rem;
            font-weight: 300;
            color: rgba(255,255,255,0.9);
            max-width: 80%;
            line-height: 1.6;
        }
        .hero-about {
            margin-top: 16px;
            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(4px);
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.15);
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
        }
        .hero-about i { margin-left: 6px; color: #ffd700; }
        .hero-about small {
            display: block;
            font-size: 0.7rem;
            font-weight: 300;
            opacity: 0.8;
        }
        .scroll-hint {
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            color: rgba(255,255,255,0.5);
            font-size: 0.65rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            animation: bounce 2s infinite;
        }
        .scroll-hint i { font-size: 1rem; }
        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-6px); }
        }
        .hero-section.hidden-hero {
            opacity: 0;
            max-height: 0;
            min-height: 0;
            height: 0;
            margin: 0 8px;
            padding: 0 16px;
            overflow: hidden;
            border-radius: 0;
            pointer-events: none;
        }
        .hero-section.hidden-hero::before { border-radius: 0; }
        .services-card {
            background: var(--glass-white);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 14px 18px;
            margin: 0 8px 12px 8px;
            border: 1px solid rgba(255,255,255,0.6);
            text-align: center;
            box-shadow: var(--shadow);
        }
        .services-card p {
            font-size: 0.85rem;
            color: var(--text-dark);
            line-height: 1.7;
            margin-bottom: 10px;
        }
        .services-card .blue-text { color: var(--primary-blue); font-weight: 700; }
        .complaint-btn {
            display: inline-block;
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 4px 14px;
            border-radius: 6px;
            font-size: 0.65rem;
            font-weight: 600;
            text-decoration: none;
            font-family: inherit;
            transition: 0.2s;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(26,115,232,0.3);
        }
        .complaint-btn:hover { background: #1557b0; transform: translateY(-2px); }
        .complaint-btn i { margin-left: 6px; }
        .categories-nav { margin: 6px 0 10px; }
        .categories-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 10px;
            list-style: none;
            padding: 0;
        }
        .category-btn {
            background: none;
            border: none;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            position: relative;
            padding: 4px 6px;
            font-family: inherit;
            border-radius: 4px;
            transition: 0.2s;
        }
        .category-btn:hover { background: var(--glass-blue); }
        .category-btn.active {
            color: var(--primary-blue);
            background: var(--glass-blue);
            padding: 4px 10px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            padding: 8px 4px 20px;
        }
        .product-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .product-img {
            height: 105px;
            background: var(--light-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--primary-blue);
        }
        .product-info { padding: 8px; }
        .product-title { font-size: 0.8rem; font-weight: 800; color: var(--text-dark); }
        .product-price { font-weight: 800; color: var(--primary-blue); font-size: 0.9rem; margin: 6px 0; }
        .action-buttons { display: flex; gap: 8px; margin: 6px 0; }
        .btn-icon-sm {
            background: var(--glass-blue);
            border: none;
            border-radius: 6px;
            padding: 6px 0;
            flex: 1;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            font-weight: 500;
            color: var(--text-dark);
            font-family: inherit;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-whatsapp-full {
            background: #25D36620;
            color: #075e54;
            border: 1px solid #25D36640;
            width: 100%;
            border-radius: 6px;
            padding: 6px 0;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
        }
        .cart-panel, .about-panel, .delivery-panel { display: none; padding: 8px 4px; }
        .cart-item {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border: 1px solid rgba(255,255,255,0.5);
        }
        .cart-item-info { flex: 2; }
        .cart-item-title { font-weight: 700; font-size: 0.85rem; color: var(--text-dark); }
        .cart-item-price { font-size: 0.7rem; color: var(--primary-blue); }
