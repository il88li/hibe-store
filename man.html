<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة HIBE STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary-blue: #1a73e8;
            --glass-white: rgba(255,255,255,0.75);
            --glass-blue: rgba(26,115,232,0.12);
            --text-dark: #1a1a2e;
            --shadow: 0 8px 32px rgba(0,0,0,0.08);
            --border-glass: rgba(255,255,255,0.5);
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #f0f4ff 0%, #e6edf8 100%);
            padding: 15px;
        }
        .admin-container {
            max-width: 1300px;
            margin: auto;
            background: var(--glass-white);
            backdrop-filter: blur(14px);
            border-radius: 16px;
            padding: 18px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-glass);
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .admin-header h1 {
            font-size: 1.5rem;
            color: var(--text-dark);
        }
        .admin-header h1 i { color: var(--primary-blue); }
        .tabs-list {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            border-bottom: 1px solid rgba(0,0,0,0.08);
            padding-bottom: 8px;
            margin-bottom: 16px;
            list-style: none;
        }
        .tab-btn {
            background: transparent;
            border: none;
            padding: 6px 14px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-dark);
            font-family: inherit;
            transition: 0.15s;
        }
        .tab-btn i { font-size: 1rem; }
        .tab-btn.active {
            background: var(--glass-blue);
            color: var(--primary-blue);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .panel { display: none; }
        .panel.active { display: block; }

        /* ---------- عرض المنتجات كبطاقات (مثل الرئيسية) ---------- */
        .admin-products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            padding: 8px 0 20px;
        }
        .admin-product-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.5);
            position: relative;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .admin-product-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
        }
        .admin-product-badges {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 3;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-end;
        }
        .admin-badge-new {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2e;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .admin-badge-availability {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 4px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.15s;
        }
        .admin-badge-available {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .admin-badge-unavailable {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
        }
        .admin-product-img {
            width: 100%;
            height: 0;
            padding-bottom: 55.555%;
            background: var(--glass-blue);
            position: relative;
            overflow: hidden;
        }
        .admin-product-img img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
        }
        .admin-product-img .img-fallback {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--primary-blue);
            background: var(--glass-blue);
        }
        .admin-product-info { padding: 14px; }
        .admin-product-title { font-size: 1rem; font-weight: 800; color: var(--text-dark); margin-bottom: 4px; }
        .admin-product-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
            font-size: 0.75rem;
            color: #555;
        }
        .admin-product-meta span {
            background: var(--glass-blue);
            padding: 3px 8px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .admin-product-meta span i { color: var(--primary-blue); font-size: 0.7rem; }
        .admin-product-description {
            font-size: 0.8rem;
            color: #555;
            line-height: 1.6;
            margin: 8px 0;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .admin-product-price { font-weight: 800; color: var(--primary-blue); font-size: 1.1rem; margin: 10px 0; }
        .admin-product-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .admin-btn-action {
            flex: 1;
            border: none;
            border-radius: 8px;
            padding: 8px 0;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            font-weight: 700;
            font-family: inherit;
            transition: 0.15s;
        }
        .admin-btn-edit {
            background: var(--glass-blue);
            color: var(--primary-blue);
            border: 1px solid rgba(26,115,232,0.2);
        }
        .admin-btn-edit:hover { background: rgba(26,115,232,0.2); }
        .admin-btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #dc2626;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .admin-btn-delete:hover { background: rgba(239, 68, 68, 0.2); }

        /* الجداول القديمة (للطلبات والتصنيفات) */
        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            overflow: hidden;
            font-size: 0.85rem;
            border: 1px solid var(--border-glass);
        }
        th, td {
            padding: 8px 6px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
            text-align: center;
            vertical-align: middle;
        }
        th {
            background: rgba(26,115,232,0.08);
            color: var(--text-dark);
            font-weight: 700;
        }
        .action-btn {
            background: none;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            margin: 0 4px;
            transition: 0.1s;
        }
        .action-btn:active { transform: scale(0.9); }
        .edit-btn { color: #2c7a4a; }
        .delete-btn { color: #b14a3a; }

        .add-btn {
            background: var(--primary-blue);
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-family: inherit;
            transition: 0.15s;
            box-shadow: 0 2px 8px rgba(26,115,232,0.25);
        }
        .add-btn:active { transform: scale(0.96); background: #1557b0; }

        .categories-bar {
            display: flex;
            flex-wrap: nowrap;
            overflow-x: auto;
            gap: 8px;
            padding: 8px 0;
            margin-bottom: 14px;
        }
        .small-cat-btn {
            background: var(--glass-blue);
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--text-dark);
            white-space: nowrap;
            cursor: pointer;
            transition: 0.15s;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .small-cat-btn:hover { background: rgba(26,115,232,0.2); }

        .stats-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 20px 0;
        }
        .stat-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            min-width: 120px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow);
        }
        .stat-card i { font-size: 1.8rem; color: var(--primary-blue); }
        .stat-number { font-size: 1.8rem; font-weight: 800; color: var(--text-dark); }

        .region-card {
            background: var(--glass-white);
            backdrop-filter: blur(8px);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            border: 1px solid var(--border-glass);
        }
        .region-card img {
            max-width: 100%;
            border-radius: 10px;
            max-height: 150px;
            object-fit: contain;
        }

        /* مودالات */
        .modal {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal.show { visibility: visible; opacity: 1; }
        .modal-content {
            background: var(--glass-white);
            backdrop-filter: blur(20px);
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-glass);
            box-shadow: var(--shadow);
        }
        .modal-content h3 { margin-bottom: 14px; color: var(--text-dark); display: flex; align-items: center; gap: 8px; }
        .modal-content h3 i { color: var(--primary-blue); }
        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 8px 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            font-size: 0.9rem;
            font-family: inherit;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
        }
        .modal-content textarea { resize: vertical; min-height: 60px; }
        .modal-content .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .modal-content .form-row > * { flex: 1; min-width: 120px; }
        .modal-content .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            font-size: 0.85rem;
            color: var(--text-dark);
        }
        .modal-content .checkbox-row input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
        }
        .modal-content .image-preview {
            text-align: center;
            margin-bottom: 12px;
        }
        .modal-content .image-preview img {
            max-width: 100px;
            max-height: 100px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 14px;
        }
        .save-btn {
            background: var(--primary-blue);
            color: white;
            flex:1;
            border: none;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.15s;
        }
        .save-btn:active { transform: scale(0.96); background: #1557b0; }
        .cancel-btn {
            background: rgba(0,0,0,0.08);
            flex:1;
            border: none;
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.15s;
        }
        .cancel-btn:active { transform: scale(0.96); }

        .toast-msg {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 6px 18px;
            border-radius: 10px;
            font-size: 0.8rem;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            z-index: 1100;
        }

        /* Dark Mode */
        body.dark-mode {
            background: linear-gradient(145deg, #0f172a 0%, #1e293b 100%);
        }
        body.dark-mode .admin-container,
        body.dark-mode .modal-content,
        body.dark-mode .stat-card,
        body.dark-mode .region-card,
        body.dark-mode .admin-product-card {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255,255,255,0.1);
            color: #e2e8f0;
        }
        body.dark-mode .admin-header h1 { color: #e2e8f0; }
        body.dark-mode .tab-btn { color: #94a3b8; }
        body.dark-mode .tab-btn.active {
            background: rgba(96, 165, 250, 0.2);
            color: #60a5fa;
        }
        body.dark-mode th {
            background: rgba(96, 165, 250, 0.15);
            color: #e2e8f0;
        }
        body.dark-mode table { background: rgba(30, 41, 59, 0.4); }
        body.dark-mode .small-cat-btn {
            background: rgba(96, 165, 250, 0.15);
            color: #e2e8f0;
        }
        body.dark-mode .stat-number { color: #60a5fa; }
        body.dark-mode .modal-content input,
        body.dark-mode .modal-content select,
        body.dark-mode .modal-content textarea {
            background: rgba(255,255,255,0.08);
            color: #e2e8f0;
            border-color: rgba(255,255,255,0.1);
        }
        body.dark-mode .admin-product-title { color: #e2e8f0; }
        body.dark-mode .admin-product-meta { color: #94a3b8; }
        body.dark-mode .admin-product-description { color: #94a3b8; }
        body.dark-mode .modal-content h3 { color: #e2e8f0; }
        body.dark-mode .checkbox-row { color: #e2e8f0; }
    </style>
</head>
<body>
<div class="admin-container">
    <header class="admin-header">
        <h1><i class="bi bi-grid"></i> لوحة الإدارة</h1>
        <button id="darkModeAdmin" class="add-btn" style="background:#475569;"><i class="bi bi-moon"></i> ليلي</button>
    </header>

    <nav>
        <ul class="tabs-list">
            <li><button class="tab-btn active" data-tab="products"><i class="bi bi-box"></i> المنتجات</button></li>
            <li><button class="tab-btn" data-tab="categories"><i class="bi bi-tags"></i> التصنيفات</button></li>
            <li><button class="tab-btn" data-tab="orders"><i class="bi bi-clipboard"></i> الطلبات</button></li>
            <li><button class="tab-btn" data-tab="stats"><i class="bi bi-bar-chart"></i> إحصائيات</button></li>
            <li><button class="tab-btn" data-tab="regions"><i class="bi bi-truck"></i> مناطق النقل</button></li>
        </ul>
    </nav>

    <!-- المنتجات -->
    <section id="productsPanel" class="panel active">
        <button id="addProductBtn" class="add-btn"><i class="bi bi-plus-lg"></i> إضافة منتج</button>
        <div id="adminProductsGrid" class="admin-products-grid"></div>
    </section>

    <!-- التصنيفات -->
    <section id="categoriesPanel" class="panel">
        <button id="addCategoryBtn" class="add-btn"><i class="bi bi-plus-lg"></i> إضافة تصنيف</button>
        <div class="categories-bar" id="categoriesBar"></div>
        <div style="overflow-x:auto;">
            <table id="categoriesTable">
                <thead><tr><th>#</th><th>اسم التصنيف</th><th>إجراءات</th></tr></thead>
                <tbody id="categoriesTbody"></tbody>
            </table>
        </div>
    </section>

    <!-- الطلبات -->
    <section id="ordersPanel" class="panel">
        <div style="overflow-x:auto;">
            <table id="ordersTable">
                <thead><tr><th>#</th><th>العميل</th><th>الجوال</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th><th>التاريخ</th><th></th></tr></thead>
                <tbody id="ordersTbody"></tbody>
            </table>
        </div>
    </section>

    <!-- الإحصائيات -->
    <section id="statsPanel" class="panel">
        <div class="stats-grid" id="statsContainer"></div>
    </section>

    <!-- مناطق النقل -->
    <section id="regionsPanel" class="panel">
        <div class="region-card">
            <img id="regionImagePreview" src="https://img.sanishtech.com/u/130d1b77889fb2e2f250198b86ae6a96.png" alt="منطقة النقل">
            <p id="regionTextPreview" style="margin:10px 0;">التوصيل متاح في صنعاء فقط</p>
            <button id="editRegionBtn" class="add-btn"><i class="bi bi-pencil"></i> تعديل</button>
        </div>
    </section>
</div>

<div id="toastMsg" class="toast-msg"></div>

<!-- مودال المنتج -->
<div id="productModal" class="modal">
    <div class="modal-content">
        <h3 id="productModalTitle"><i class="bi bi-box-seam"></i> إضافة منتج</h3>
        <input type="text" id="prodName" placeholder="اسم المنتج *">
        <select id="prodCategory"></select>
        <div class="form-row">
            <input type="number" id="prodPrice" placeholder="السعر *">
            <input type="text" id="prodIcon" placeholder="أيقونة" value="bi bi-tag">
        </div>
        <input type="url" id="prodImageUrl" placeholder="رابط الصورة *">
        <div class="image-preview" id="imagePreviewDiv" style="display:none;">
            <img id="imagePreview" src="">
        </div>
        <textarea id="prodDescription" placeholder="وصف المنتج"></textarea>
        <div class="form-row">
            <input type="text" id="prodColors" placeholder="الألوان (مثال: أحمر، أزرق، أسود)">
            <input type="text" id="prodMaterial" placeholder="الخامة (مثال: قطن 100%)">
        </div>
        <input type="text" id="prodCountry" placeholder="بلد المنتج (مثال: اليمن، تركيا، الصين)">
        <div class="checkbox-row">
            <input type="checkbox" id="prodIsNew">
            <label for="prodIsNew">علامة "جديد"</label>
        </div>
        <div class="checkbox-row">
            <input type="checkbox" id="prodIsAvailable" checked>
            <label for="prodIsAvailable">متوفر للبيع</label>
        </div>
        <div class="modal-buttons">
            <button id="saveProductBtn" class="save-btn">حفظ</button>
            <button id="cancelProductBtn" class="cancel-btn">إلغاء</button>
        </div>
    </div>
</div>

<!-- مودال التصنيف -->
<div id="categoryModal" class="modal">
    <div class="modal-content">
        <h3><i class="bi bi-tags"></i> إضافة تصنيف</h3>
        <input type="text" id="newCategoryName" placeholder="اسم التصنيف">
        <div class="modal-buttons">
            <button id="saveCategoryBtn" class="save-btn">حفظ</button>
            <button id="cancelCategoryBtn" class="cancel-btn">إلغاء</button>
        </div>
    </div>
</div>

<!-- مودال منطقة النقل -->
<div id="regionModal" class="modal">
    <div class="modal-content">
        <h3><i class="bi bi-truck"></i> تعديل منطقة النقل</h3>
        <input type="url" id="regionImage" placeholder="رابط الصورة">
        <textarea id="regionText" rows="2" placeholder="نص التوصيل"></textarea>
        <div class="modal-buttons">
            <button id="saveRegionBtn" class="save-btn">حفظ</button>
            <button id="cancelRegionBtn" class="cancel-btn">إلغاء</button>
        </div>
    </div>
</div>

<script>
    // ----------------------- دوال مساعدة -----------------------
    let editingProductId = null;
    function showToast(msg) {
        const t = document.getElementById("toastMsg");
        t.innerText = msg;
        t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 2000);
    }
    async function fetchAPI(url, options = {}) {
        const res = await fetch(url, options);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
    }

    // ----------------------- المنتجات (عرض كبطاقات) -----------------------
    async function loadProducts() {
        try {
            const products = await fetchAPI('/api/products');
            renderAdminProducts(products);
        } catch(e) { showToast("خطأ في تحميل المنتجات"); }
    }
    function renderAdminProducts(products) {
        const grid = document.getElementById("adminProductsGrid");
        if (!grid) return;
        if (products.length === 0) {
            grid.innerHTML = `<div class="empty-message" style="grid-column:1/-1; text-align:center; padding:40px;"><i class="bi bi-bag-x" style="font-size:2.5rem; color:var(--primary-blue); display:block; margin-bottom:12px;"></i><p>لا توجد منتجات بعد.</p></div>`;
            return;
        }
        grid.innerHTML = products.map(prod => {
            const isAvailable = prod.is_available !== false;
            const isNew = prod.is_new === true;

            let metaHtml = '';
            if (prod.material) metaHtml += `<span><i class="bi bi-layers"></i>${prod.material}</span>`;
            if (prod.country) metaHtml += `<span><i class="bi bi-geo-alt"></i>${prod.country}</span>`;
            if (prod.colors) metaHtml += `<span><i class="bi bi-palette"></i>${prod.colors}</span>`;

            return `
            <div class="admin-product-card" data-id="${prod.id}">
                <div class="admin-product-badges">
                    ${isNew ? `<div class="admin-badge-new"><i class="bi bi-stars"></i> جديد</div>` : ''}
                    <div class="admin-badge-availability ${isAvailable ? 'admin-badge-available' : 'admin-badge-unavailable'}" onclick="toggleAvailability(${prod.id}, ${!isAvailable})" title="انقر لتغيير التوفر">
                        <i class="bi ${isAvailable ? 'bi-check-circle' : 'bi-x-circle'}"></i>
                        ${isAvailable ? 'متوفر' : 'غير متوفر'}
                    </div>
                </div>
                <div class="admin-product-img">
                    ${prod.image_url ? `<img src="${prod.image_url}" alt="${prod.name}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"><div class="img-fallback" style="display:none;"><i class="bi bi-image"></i></div>` : `<div class="img-fallback"><i class="${prod.icon || 'bi bi-tag'}"></i></div>`}
                </div>
                <div class="admin-product-info">
                    <div class="admin-product-title">${prod.name}</div>
                    <div style="font-size:0.75rem; color:#666; margin-bottom:4px;">${prod.category}</div>
                    ${metaHtml ? `<div class="admin-product-meta">${metaHtml}</div>` : ''}
                    ${prod.description ? `<p class="admin-product-description">${prod.description}</p>` : ''}
                    <div class="admin-product-price">${prod.price} ر.ي</div>
                    <div class="admin-product-actions">
                        <button class="admin-btn-action admin-btn-edit" onclick="editProduct(${prod.id})">
                            <i class="bi bi-pencil"></i> تعديل
                        </button>
                        <button class="admin-btn-action admin-btn-delete" onclick="deleteProduct(${prod.id})">
                            <i class="bi bi-trash3"></i> حذف
                        </button>
                    </div>
                </div>
            </div>
            `;
        }).join('');
    }

    async function toggleAvailability(id, newStatus) {
        try {
            const product = await fetchAPI(`/api/products/${id}`);
            if (!product) { showToast("المنتج غير موجود"); return; }
            await fetchAPI(`/api/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: product.name,
                    category: product.category,
                    price: product.price,
                    icon: product.icon || 'bi bi-tag',
                    image_url: product.image_url || '',
                    description: product.description || '',
                    colors: product.colors || '',
                    material: product.material || '',
                    country: product.country || '',
                    is_new: product.is_new || false,
                    is_available: newStatus
                })
            });
            showToast(newStatus ? "✓ المنتج أصبح متوفراً" : "✗ المنتج أصبح غير متوفر");
            loadProducts();
        } catch(e) { showToast("فشل التحديث"); }
    }

    async function deleteProduct(id) {
        if (!confirm("حذف المنتج؟")) return;
        try {
            await fetchAPI(`/api/products/${id}`, { method: 'DELETE' });
            showToast("تم الحذف");
            loadProducts();
        } catch(e) { showToast("فشل الحذف"); }
    }
    async function editProduct(id) {
        try {
            const product = await fetchAPI(`/api/products/${id}`);
            openProductModal(product);
        } catch(e) { showToast("خطأ في تحميل المنتج"); }
    }
    async function openProductModal(product = null) {
        editingProductId = product?.id || null;
        document.getElementById("productModalTitle").innerHTML = product ? '<i class="bi bi-pencil-square"></i> تعديل منتج' : '<i class="bi bi-box-seam"></i> إضافة منتج';
        try {
            const cats = await fetchAPI('/api/categories');
            const select = document.getElementById("prodCategory");
            select.innerHTML = '<option value="">اختر التصنيف</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
            if (product) {
                document.getElementById("prodName").value = product.name || "";
                document.getElementById("prodCategory").value = product.category || "";
                document.getElementById("prodPrice").value = product.price || "";
                document.getElementById("prodIcon").value = product.icon || "bi bi-tag";
                document.getElementById("prodImageUrl").value = product.image_url || "";
                document.getElementById("prodDescription").value = product.description || "";
                document.getElementById("prodColors").value = product.colors || "";
                document.getElementById("prodMaterial").value = product.material || "";
                document.getElementById("prodCountry").value = product.country || "";
                document.getElementById("prodIsNew").checked = product.is_new === true;
                document.getElementById("prodIsAvailable").checked = product.is_available !== false;
                if (product.image_url) {
                    document.getElementById("imagePreview").src = product.image_url;
                    document.getElementById("imagePreviewDiv").style.display = "block";
                } else document.getElementById("imagePreviewDiv").style.display = "none";
            } else {
                document.getElementById("prodName").value = "";
                document.getElementById("prodCategory").value = "";
                document.getElementById("prodPrice").value = "";
                document.getElementById("prodIcon").value = "bi bi-tag";
                document.getElementById("prodImageUrl").value = "";
                document.getElementById("prodDescription").value = "";
                document.getElementById("prodColors").value = "";
                document.getElementById("prodMaterial").value = "";
                document.getElementById("prodCountry").value = "";
                document.getElementById("prodIsNew").checked = false;
                document.getElementById("prodIsAvailable").checked = true;
                document.getElementById("imagePreviewDiv").style.display = "none";
            }
            document.getElementById("productModal").classList.add("show");
        } catch(e) { showToast("خطأ في تحميل التصنيفات"); }
    }
    async function saveProduct() {
        const name = document.getElementById("prodName").value.trim();
        const category = document.getElementById("prodCategory").value;
        const price = parseFloat(document.getElementById("prodPrice").value);
        const icon = document.getElementById("prodIcon").value.trim();
        const image_url = document.getElementById("prodImageUrl").value.trim();
        const description = document.getElementById("prodDescription").value.trim();
        const colors = document.getElementById("prodColors").value.trim();
        const material = document.getElementById("prodMaterial").value.trim();
        const country = document.getElementById("prodCountry").value.trim();
        const is_new = document.getElementById("prodIsNew").checked;
        const is_available = document.getElementById("prodIsAvailable").checked;

        if (!name || !category || isNaN(price) || price <= 0) {
            showToast("املأ الاسم والتصنيف والسعر");
            return;
        }
        if (!image_url) { showToast("رابط الصورة إجباري"); return; }
        const data = { name, category, price, icon, image_url, description, colors, material, country, is_new, is_available };
        try {
            if (editingProductId) {
                await fetchAPI(`/api/products/${editingProductId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showToast("تم التعديل");
            } else {
                await fetchAPI('/api/products', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                showToast("تمت الإضافة");
            }
            document.getElementById("productModal").classList.remove("show");
            loadProducts();
        } catch(e) { showToast("فشل الحفظ: " + e.message); }
    }
    document.getElementById("prodImageUrl").addEventListener("input", function() {
        const url = this.value;
        const preview = document.getElementById("imagePreview");
        const div = document.getElementById("imagePreviewDiv");
        if (url && (url.startsWith("http") || url.startsWith("https"))) {
            preview.src = url;
            div.style.display = "block";
        } else div.style.display = "none";
    });

    // ----------------------- التصنيفات -----------------------
    async function loadCategories() {
        try {
            const cats = await fetchAPI('/api/categories');
            renderCategories(cats);
            renderCategoriesBar(cats);
        } catch(e) { showToast("خطأ في تحميل التصنيفات"); }
    }
    function renderCategories(cats) {
        const tbody = document.getElementById("categoriesTbody");
        tbody.innerHTML = "";
        cats.forEach((cat, i) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = i+1;
            row.insertCell(1).innerText = cat;
            const delBtn = document.createElement("button");
            delBtn.innerHTML = '<i class="bi bi-trash3"></i>';
            delBtn.className = "action-btn delete-btn";
            delBtn.onclick = () => deleteCategory(cat);
            row.insertCell(2).appendChild(delBtn);
        });
    }
    function renderCategoriesBar(cats) {
        const bar = document.getElementById("categoriesBar");
        bar.innerHTML = cats.map(cat => `<button class="small-cat-btn">${cat}</button>`).join('');
    }
    async function deleteCategory(cat) {
        if (!confirm(`حذف تصنيف "${cat}"؟`)) return;
        try {
            await fetchAPI(`/api/categories/${encodeURIComponent(cat)}`, { method: 'DELETE' });
            showToast("تم الحذف");
            loadCategories();
            loadProducts();
        } catch(e) { showToast("فشل الحذف"); }
    }
    function openCategoryModal() {
        document.getElementById("newCategoryName").value = "";
        document.getElementById("categoryModal").classList.add("show");
    }
    async function saveCategory() {
        const name = document.getElementById("newCategoryName").value.trim();
        if (!name) { showToast("أدخل اسم التصنيف"); return; }
        try {
            await fetchAPI('/api/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            showToast("تمت الإضافة");
            document.getElementById("categoryModal").classList.remove("show");
            loadCategories();
        } catch(e) { showToast("فشل الإضافة"); }
    }

    // ----------------------- الطلبات -----------------------
    async function loadOrders() {
        try {
            const orders = await fetchAPI('/api/orders');
            renderOrders(orders);
        } catch(e) { showToast("خطأ في تحميل الطلبات"); }
    }
    function renderOrders(orders) {
        const tbody = document.getElementById("ordersTbody");
        tbody.innerHTML = "";
        orders.forEach((o, i) => {
            const row = tbody.insertRow();
            row.insertCell(0).innerText = i+1;
            row.insertCell(1).innerText = o.customer_name;
            row.insertCell(2).innerText = o.phone;
            row.insertCell(3).innerHTML = o.items.map(it => `${it.name} (${it.qty})`).join('<br>');
            row.insertCell(4).innerText = o.total;
            const statusCell = row.insertCell(5);
            const select = document.createElement("select");
            select.className = "status-select";
            select.style.cssText = "padding:4px; border-radius:6px; border:1px solid rgba(0,0,0,0.1); font-family:inherit;";
            ["قيد التسليم", "تم التسليم", "ملغي", "نفاذ الكمية"].forEach(s => {
                const opt = document.createElement("option");
                opt.value = s;
                opt.innerText = s;
                if (o.status === s) opt.selected = true;
                select.appendChild(opt);
            });
            select.onchange = async () => {
                try {
                    await fetchAPI(`/api/orders/${o.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: select.value })
                    });
                    showToast("تم تحديث الحالة");
                    loadOrders();
                    if (document.querySelector('.tab-btn.active').dataset.tab === 'stats') loadStats();
                } catch(e) { showToast("خطأ"); }
            };
            statusCell.appendChild(select);
            row.insertCell(6).innerText = new Date(o.createdAt).toLocaleDateString();
            row.insertCell(7).innerHTML = "";
        });
    }

    // ----------------------- الإحصائيات -----------------------
    async function loadStats() {
        try {
            const [products, orders] = await Promise.all([
                fetchAPI('/api/products'),
                fetchAPI('/api/orders')
            ]);
            const totalProducts = products.length;
            const totalOrders = orders.length;
            const pending = orders.filter(o => o.status === "قيد التسليم").length;
            const delivered = orders.filter(o => o.status === "تم التسليم").length;
            const revenue = orders.reduce((s, o) => s + (o.total || 0), 0);
            document.getElementById("statsContainer").innerHTML = `
                <div class="stat-card"><i class="bi bi-box"></i><div class="stat-number">${totalProducts}</div><div>المنتجات</div></div>
                <div class="stat-card"><i class="bi bi-cart"></i><div class="stat-number">${totalOrders}</div><div>الطلبات</div></div>
                <div class="stat-card"><i class="bi bi-clock-history"></i><div class="stat-number">${pending}</div><div>قيد التسليم</div></div>
                <div class="stat-card"><i class="bi bi-check2-circle"></i><div class="stat-number">${delivered}</div><div>مكتملة</div></div>
                <div class="stat-card"><i class="bi bi-currency-dollar"></i><div class="stat-number">${revenue}</div><div>الإيرادات (ر.ي)</div></div>
            `;
        } catch(e) { showToast("خطأ في الإحصائيات"); }
    }

    // ----------------------- مناطق النقل -----------------------
    let regionSettings = { image: "https://img.sanishtech.com/u/130d1b77889fb2e2f250198b86ae6a96.png", text: "التوصيل متاح في صنعاء فقط" };
    function loadRegionSettings() {
        const stored = localStorage.getItem("hibe_region");
        if (stored) regionSettings = JSON.parse(stored);
        updateRegionUI();
    }
    function updateRegionUI() {
        document.getElementById("regionImagePreview").src = regionSettings.image;
        document.getElementById("regionTextPreview").innerText = regionSettings.text;
    }
    function openRegionModal() {
        document.getElementById("regionImage").value = regionSettings.image;
        document.getElementById("regionText").value = regionSettings.text;
        document.getElementById("regionModal").classList.add("show");
    }
    function saveRegionSettings() {
        const newImage = document.getElementById("regionImage").value.trim();
        const newText = document.getElementById("regionText").value.trim();
        if (newImage) regionSettings.image = newImage;
        if (newText) regionSettings.text = newText;
        localStorage.setItem("hibe_region", JSON.stringify(regionSettings));
        updateRegionUI();
        document.getElementById("regionModal").classList.remove("show");
        showToast("تم التحديث");
    }

    // ----------------------- التنقل بين التبويبات -----------------------
    function setActiveTab(tab) {
        document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
        document.getElementById(`${tab}Panel`).classList.add("active");
        document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
        if (tab === 'products') loadProducts();
        else if (tab === 'categories') loadCategories();
        else if (tab === 'orders') loadOrders();
        else if (tab === 'stats') loadStats();
        else if (tab === 'regions') loadRegionSettings();
    }

    // ----------------------- الوضع الليلي -----------------------
    function setupDarkMode() {
        const isDark = localStorage.getItem("admin_dark") === "true";
        if (isDark) document.body.classList.add("dark-mode");
        document.getElementById("darkModeAdmin").addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            localStorage.setItem("admin_dark", document.body.classList.contains("dark-mode"));
        });
    }

    // ----------------------- أحداث الأزرار -----------------------
    document.getElementById("addProductBtn").addEventListener("click", () => openProductModal());
    document.getElementById("saveProductBtn").addEventListener("click", saveProduct);
    document.getElementById("cancelProductBtn").addEventListener("click", () => document.getElementById("productModal").classList.remove("show"));
    document.getElementById("addCategoryBtn").addEventListener("click", openCategoryModal);
    document.getElementById("saveCategoryBtn").addEventListener("click", saveCategory);
    document.getElementById("cancelCategoryBtn").addEventListener("click", () => document.getElementById("categoryModal").classList.remove("show"));
    document.getElementById("editRegionBtn").addEventListener("click", openRegionModal);
    document.getElementById("saveRegionBtn").addEventListener("click", saveRegionSettings);
    document.getElementById("cancelRegionBtn").addEventListener("click", () => document.getElementById("regionModal").classList.remove("show"));
    document.querySelectorAll(".tab-btn").forEach(btn => btn.addEventListener("click", () => setActiveTab(btn.dataset.tab)));

    // ----------------------- بدء التشغيل -----------------------
    setupDarkMode();
    setActiveTab("products");
</script>
</body>
</html>
