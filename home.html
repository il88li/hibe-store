<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HIBE STORE | المتجر والدردشة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #f4ede8 0%, #e5dbd2 100%);
            padding-bottom: 85px;
        }
        .app-container { max-width: 550px; margin: 0 auto; padding: 0 12px; }
        .glass-navbar {
            background: rgba(255,250,245,0.65); backdrop-filter: blur(14px);
            border-radius: 40px; padding: 8px 18px; margin: 12px 8px;
            display: flex; justify-content: space-between;
        }
        .brand { font-weight: 800; background: linear-gradient(135deg, #5f3f2e, #b58260); background-clip: text; color: transparent; }
        .theme-icon-btn { background: rgba(200,180,160,0.3); border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        .tabs { display: flex; gap: 5px; background: rgba(0,0,0,0.05); border-radius: 50px; padding: 4px; margin: 5px 8px; }
        .tab-btn { flex: 1; background: transparent; border: none; padding: 8px; border-radius: 40px; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: #b58260; color: white; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr)); gap: 14px; padding: 8px; }
        .prestige-card { background: rgba(255,253,250,0.85); border-radius: 24px; overflow: hidden; box-shadow: 0 12px 24px -12px rgba(0,0,0,0.2); cursor: pointer; }
        .product-img { height: 105px; background: #f8ede3; display: flex; align-items: center; justify-content: center; font-size: 2rem; }
        .product-info { padding: 8px; }
        .product-title { font-size: 0.8rem; font-weight: 800; }
        .product-price { font-weight: 800; color: #aa7a58; }
        .double-buttons { display: flex; gap: 8px; margin: 8px 0; }
        .icon-btn-sm { background: #e8dbd0; border: none; border-radius: 30px; padding: 5px; flex:1; display: flex; gap: 4px; justify-content: center; }
        .full-whatsapp-btn { background: #25D36620; color: #075e54; border:1px solid #25D36640; width:100%; border-radius: 30px; padding: 6px; display: flex; justify-content: center; gap: 6px; }
        .cart-panel, .chat-panel { display: none; padding: 10px; }
        .chat-messages { height: 350px; overflow-y: auto; background: rgba(255,255,240,0.6); border-radius: 24px; padding: 12px; margin-bottom: 12px; }
        .message { margin-bottom: 12px; padding: 8px 12px; border-radius: 20px; max-width: 85%; }
        .message.user { background: #b58260; color: white; margin-right: auto; text-align: right; }
        .message.admin { background: #e0cfc0; color: #2c241f; margin-left: auto; text-align: left; }
        .chat-input { display: flex; gap: 8px; }
        .chat-input input { flex: 1; padding: 10px; border-radius: 50px; border: 1px solid #ddd; }
        .chat-input button { background: #b58260; color: white; border: none; padding: 10px 20px; border-radius: 50px; }
        .toast-msg { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #2d241fe6; color: white; padding: 6px 14px; border-radius: 60px; opacity: 0; transition: 0.2s; pointer-events: none; z-index: 1100; }
        .floating-bottom-nav { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); width: calc(100% - 30px); max-width: 500px; background: rgba(250,245,240,0.9); backdrop-filter: blur(20px); border-radius: 50px; display: flex; justify-content: space-around; padding: 6px; z-index: 40; }
        .nav-icon-btn { background: transparent; border: none; font-size: 0.7rem; padding: 6px 18px; border-radius: 50px; display: flex; align-items: center; gap: 5px; }
        .nav-icon-btn.active { background: #e4d5c9; color: #7c5c44; }
        .badge-icon { background: #b17a58; color: white; border-radius: 40px; padding: 0px 6px; font-size: 0.6rem; }
        .modal-order { position: fixed; top:0;left:0;width:100%;height:100%; background:rgba(0,0,0,0.5); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; z-index: 1000; visibility: hidden; opacity: 0; }
        .modal-order.show { visibility: visible; opacity: 1; }
        .order-form { background: #fffcf7; width: 85%; max-width: 340px; border-radius: 36px; padding: 20px; }
        .order-form input { width: 100%; padding: 10px; margin-bottom: 12px; border-radius: 40px; border: 1px solid #e0cfc0; }
        .order-form button { background: #25D366; border: none; width: 100%; padding: 10px; border-radius: 50px; color: white; margin-top: 6px; }
        body.dark-mode { background: #251f1b; }
        body.dark-mode .prestige-card, body.dark-mode .cart-item-card, body.dark-mode .order-form, body.dark-mode .chat-messages { background: #322a25; color: #f0e2d8; }
    </style>
</head>
<body>
<div class="app-container">
    <div class="glass-navbar">
        <div class="brand">HIBE STORE</div>
        <button class="theme-icon-btn" id="darkModeBtn"><i class="bi bi-moon-stars"></i></button>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="store">🛍️ المتجر</button>
        <button class="tab-btn" data-tab="cart">🛒 السلة</button>
        <button class="tab-btn" data-tab="chat">💬 الدردشة</button>
    </div>

    <div id="storePanel" class="products-grid"></div>
    <div id="cartPanel" class="cart-panel"><div id="cartList"></div><div id="cartTotal"></div></div>
    <div id="chatPanel" class="chat-panel">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="اكتب رسالتك...">
            <button id="sendChatBtn"><i class="bi bi-send"></i> إرسال</button>
        </div>
    </div>
</div>

<div class="floating-bottom-nav">
    <button class="nav-icon-btn active" data-tab="home"><i class="bi bi-house-door"></i> الرئيسية</button>
    <button class="nav-icon-btn" data-tab="cart"><i class="bi bi-cart"></i> السلة <span id="cartBadgeFloat" class="badge-icon" style="display:none;">0</span></button>
</div>

<div id="toastMsg" class="toast-msg"></div>
<div id="orderModal" class="modal-order"><div class="order-form"><h3>طلب المنتج</h3><input id="orderName" placeholder="الاسم"><input id="orderAddress" placeholder="العنوان"><input id="orderPhone" placeholder="الجوال"><input id="orderNotes" placeholder="ملاحظات"><button id="sendWhatsappBtn">إرسال الطلب</button><button id="closeOrderModal" class="close-order">إلغاء</button></div></div>

<script>
    let products = [], cart = [], currentFilter = "all", pendingOrderData = null;
    let currentTab = "store";
    const whatsappNumber = "967730577358";

    function showToast(msg) { let t = document.getElementById("toastMsg"); t.innerText = msg; t.style.opacity = "1"; setTimeout(() => t.style.opacity = "0", 1800); }
    async function fetchProducts() { let res = await fetch('/api/products'); products = await res.json(); renderStore(); }
    function saveCart() { localStorage.setItem("hibe_cart", JSON.stringify(cart)); updateBadge(); if(currentTab === 'cart') renderCart(); }
    function loadCart() { let saved = localStorage.getItem("hibe_cart"); cart = saved ? JSON.parse(saved) : []; updateBadge(); renderCart(); }
    function updateBadge() { let total = cart.reduce((s,i)=>s+i.qty,0); let badge = document.getElementById("cartBadgeFloat"); if(total>0) { badge.style.display="inline-block"; badge.innerText=total>9?"9+":total; } else badge.style.display="none"; }
    function addToCart(pid,qty=1) { let prod=products.find(p=>p.id===pid); if(!prod) return; let ex=cart.find(i=>i.id===pid); if(ex) ex.qty+=qty; else cart.push({id:pid,name:prod.name,price:prod.price,qty}); saveCart(); showToast(`✓ ${prod.name} أضيف للسلة`); if(currentTab==='cart') renderCart(); }
    function removeItem(pid) { cart=cart.filter(i=>i.id!==pid); saveCart(); if(currentTab==='cart') renderCart(); }
    function updateQty(pid,delta) { let item=cart.find(i=>i.id===pid); if(item){ let newQ=item.qty+delta; if(newQ<=0) removeItem(pid); else { item.qty=newQ; saveCart(); if(currentTab==='cart') renderCart(); } } }
    function clearCart() { cart=[]; saveCart(); if(currentTab==='cart') renderCart(); showToast("تم تفريغ السلة"); }
    function renderStore() { let grid = document.getElementById("storePanel"); let filtered = currentFilter==="all"?products:products.filter(p=>p.category===currentFilter); if(filtered.length===0){ grid.innerHTML="<div style='text-align:center;padding:30px;'>لا توجد منتجات</div>"; return; }
        grid.innerHTML = filtered.map(prod=>`<div class="prestige-card"><div class="product-img"><i class="${prod.icon}"></i></div><div class="product-info"><div class="product-title">${prod.name}</div><div class="product-price">${prod.price} ر.س</div><div class="double-buttons"><button class="icon-btn-sm addCartBtn" data-id="${prod.id}"><i class="bi bi-cart-plus"></i> سلة</button><button class="icon-btn-sm shareBtn" data-id="${prod.id}"><i class="bi bi-share"></i> مشاركة</button></div><button class="full-whatsapp-btn whatsapp-order" data-prod='${JSON.stringify({id:prod.id,name:prod.name,price:prod.price,qty:1})}'><i class="bi bi-whatsapp"></i> طلب عبر واتساب</button></div></div>`).join('');
        document.querySelectorAll(".addCartBtn").forEach(btn=>btn.addEventListener("click",(e)=>{e.stopPropagation(); addToCart(parseInt(btn.dataset.id));}));
        document.querySelectorAll(".shareBtn").forEach(btn=>btn.addEventListener("click",(e)=>{ e.stopPropagation(); let id=parseInt(btn.dataset.id); let product=products.find(p=>p.id===id); navigator.clipboard.writeText(window.location.href.split('?')[0]+"?product="+id); showToast(`📎 نسخ رابط ${product.name}`); }));
        document.querySelectorAll(".whatsapp-order").forEach(btn=>btn.addEventListener("click",(e)=>{ e.stopPropagation(); pendingOrderData={type:'single',product:JSON.parse(btn.dataset.prod)}; document.getElementById("orderModal").classList.add("show"); }));
    }
    function renderCart() { let container=document.getElementById("cartList"); let totalDiv=document.getElementById("cartTotal"); if(cart.length===0){ container.innerHTML="<div style='text-align:center;padding:30px;'>السلة فارغة</div>"; totalDiv.innerHTML="<span>المجموع 0 ر.س</span>"; return; }
        let total=0,html=''; cart.forEach(item=>{ let itemTotal=item.price*item.qty; total+=itemTotal; html+=`<div class="cart-item-card"><div><b>${item.name}</b> ${item.price}×${item.qty}=${itemTotal} ر.س</div><div><button class="cart-qty-btn" data-id="${item.id}" data-delta="-1">-</button><span>${item.qty}</span><button class="cart-qty-btn" data-id="${item.id}" data-delta="1">+</button><button class="remove-item-icon" data-id="${item.id}"><i class="bi bi-trash3"></i></button></div><button class="full-whatsapp-btn cart-whatsapp" data-prod='${JSON.stringify({id:item.id,name:item.name,price:item.price,qty:item.qty})}'><i class="bi bi-whatsapp"></i> طلب هذا المنتج</button></div>`; });
        container.innerHTML=html; totalDiv.innerHTML=`<span>الإجمالي: ${total} ر.س</span><button id="orderWholeCartBtn" class="full-whatsapp-btn">طلب السلة كاملة</button>`;
        document.querySelectorAll(".cart-qty-btn").forEach(btn=>btn.addEventListener("click",(e)=>{ updateQty(parseInt(btn.dataset.id),parseInt(btn.dataset.delta)); }));
        document.querySelectorAll(".remove-item-icon").forEach(btn=>btn.addEventListener("click",(e)=>{ removeItem(parseInt(btn.dataset.id)); }));
        document.querySelectorAll(".cart-whatsapp").forEach(btn=>btn.addEventListener("click",(e)=>{ let prod=JSON.parse(btn.dataset.prod); pendingOrderData={type:'single',product:prod}; document.getElementById("orderModal").classList.add("show"); }));
        document.getElementById("orderWholeCartBtn")?.addEventListener("click",()=>{ pendingOrderData={type:'cart', items:cart.map(i=>({name:i.name,price:i.price,qty:i.qty})), total:total }; document.getElementById("orderModal").classList.add("show"); });
    }
    function sendWhatsAppOrder() { let name=document.getElementById("orderName").value.trim(); let phone=document.getElementById("orderPhone").value.trim(); if(!name||!phone){ showToast("يرجى إدخال الاسم والجوال"); return; }
        let address=document.getElementById("orderAddress").value.trim()||"لم يحدد"; let notes=document.getElementById("orderNotes").value.trim()||"بدون ملاحظات";
        let details=""; if(pendingOrderData?.type==='single'){ let p=pendingOrderData.product; details=`المنتج: ${p.name}\nالسعر: ${p.price} ر.س\nالكمية: ${p.qty}\nالإجمالي: ${p.price*p.qty} ر.س`; }
        else if(pendingOrderData?.type==='cart'){ details=pendingOrderData.items.map(i=>`${i.name} (${i.qty}×${i.price}=${i.price*i.qty} ر.س)`).join('\n'); details+=`\nالإجمالي الكلي: ${pendingOrderData.total} ر.س`; }
        let msg=`🌿 طلب جديد من HIBE STORE 🌿\n👤 الاسم: ${name}\n📍 العنوان: ${address}\n📞 الجوال: ${phone}\n📝 ملاحظات: ${notes}\n📌 تفاصيل الطلب:\n${details}`;
        window.open(`https://wa.me/${whatsappNumber}?text=${encodeURIComponent(msg)}`,'_blank');
        // حفظ الطلب في الخادم
        fetch('/api/orders', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ customerName:name, address, phone, notes, items:pendingOrderData?.type==='cart'?pendingOrderData.items:[pendingOrderData?.product], total:pendingOrderData?.total||(pendingOrderData?.product.price*pendingOrderData?.product.qty) }) });
        document.getElementById("orderModal").classList.remove("show"); showToast("تم التوجيه إلى واتساب");
    }
    // الدردشة
    let messages = [];
    async function loadMessages() { let res = await fetch('/api/messages'); messages = await res.json(); renderChat(); }
    async function sendMessage(text, sender='user') { let msg={ sender, text, timestamp:new Date().toISOString() }; await fetch('/api/messages', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(msg) }); loadMessages(); }
    function renderChat() { let container = document.getElementById("chatMessages"); if(!container) return; container.innerHTML = messages.map(m=>`<div class="message ${m.sender}"><b>${m.sender==='user'?'أنت':'الإدارة'}</b><br>${m.text}<br><small>${new Date(m.timestamp).toLocaleTimeString()}</small></div>`).join(''); container.scrollTop = container.scrollHeight; }
    document.getElementById("sendChatBtn")?.addEventListener("click",()=>{ let input=document.getElementById("chatInput"); if(input.value.trim()){ sendMessage(input.value.trim(), 'user'); input.value=""; } });
    // التبويبات
    function setActiveTab(tab) { currentTab=tab; document.getElementById("storePanel").style.display=tab==='store'?'grid':'none'; document.getElementById("cartPanel").style.display=tab==='cart'?'block':'none'; document.getElementById("chatPanel").style.display=tab==='chat'?'block':'none'; document.querySelectorAll(".tab-btn").forEach(btn=>btn.classList.toggle("active",btn.dataset.tab===tab)); if(tab==='cart') renderCart(); if(tab==='chat') loadMessages(); }
    document.querySelectorAll(".tab-btn").forEach(btn=>btn.addEventListener("click",()=>setActiveTab(btn.dataset.tab)));
    // الوضع الليلي
    function setupDarkMode(){ let isDark=localStorage.getItem("hibe_dark")==="true"; if(isDark) document.body.classList.add("dark-mode"); document.getElementById("darkModeBtn").addEventListener("click",()=>{ document.body.classList.toggle("dark-mode"); localStorage.setItem("hibe_dark",document.body.classList.contains("dark-mode")); }); }
    async function init(){ await fetchProducts(); loadCart(); setupDarkMode(); document.getElementById("sendWhatsappBtn").addEventListener("click",sendWhatsAppOrder); document.getElementById("closeOrderModal").addEventListener("click",()=>document.getElementById("orderModal").classList.remove("show")); setActiveTab("store"); }
    init();
</script>
</body>
</html>
