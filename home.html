<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HIBE STORE | متجرك الأنيق</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #f4ede8 0%, #e5dbd2 100%);
            min-height: 100vh;
            padding-bottom: 85px;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(70, 50, 40, 0.08) 1.2px, transparent 1.2px);
            background-size: 28px 28px;
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            max-width: 550px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            padding: 0 12px;
        }

        .glass-navbar {
            position: sticky;
            top: 12px;
            z-index: 30;
            margin: 0 8px 16px 8px;
            background: rgba(255, 250, 245, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 18px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(255, 245, 235, 0.7);
        }
        .brand {
            font-size: 1.35rem;
            font-weight: 800;
            background: linear-gradient(135deg, #5f3f2e, #b58260);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .theme-icon-btn {
            background: rgba(200, 180, 160, 0.3);
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 1.1rem;
            cursor: pointer;
            color: #6f4a33;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .categories-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px 12px;
            padding: 8px 6px 18px;
            margin-bottom: 4px;
        }
        .chip-cat {
            background: transparent;
            border: none;
            padding: 4px 0;
            font-size: 0.75rem;
            font-weight: 600;
            color: #5e4537;
            cursor: pointer;
            position: relative;
            white-space: nowrap;
        }
        .chip-cat::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 0;
            height: 2px;
            background: #bd8f6e;
            transition: 0.2s;
        }
        .chip-cat.active {
            color: #9b6e50;
        }
        .chip-cat.active::after {
            width: 100%;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 14px;
            padding: 4px 2px 18px;
        }

        .prestige-card {
            background: rgba(255, 253, 250, 0.85);
            backdrop-filter: blur(4px);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 12px 24px -12px rgba(0, 0, 0, 0.2);
            transition: 0.1s;
            cursor: pointer;
            border: 1px solid rgba(235, 220, 205, 0.8);
        }
        .product-img {
            height: 105px;
            background: #f8ede3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #b28160;
        }
        .product-info {
            padding: 8px 8px 12px;
        }
        .product-title {
            font-size: 0.8rem;
            font-weight: 800;
        }
        .product-category {
            font-size: 0.6rem;
            background: #efe3d9;
            display: inline-block;
            padding: 1px 8px;
            border-radius: 30px;
        }
        .product-price {
            font-weight: 800;
            color: #aa7a58;
            font-size: 0.9rem;
            margin: 6px 0 8px;
        }

        .double-buttons {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .icon-btn-sm {
            background: #e8dbd0;
            border: none;
            border-radius: 30px;
            padding: 6px 0;
            width: 100%;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            cursor: pointer;
            color: #5c3f2f;
            font-weight: 500;
        }
        .full-whatsapp-btn {
            background: #25D36620;
            color: #075e54;
            border: 1px solid #25D36640;
            width: 100%;
            border-radius: 30px;
            padding: 6px 0;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            cursor: pointer;
            font-weight: 600;
        }
        .full-whatsapp-btn:active {
            transform: scale(0.97);
        }

        .cart-panel {
            padding: 10px 0 20px;
            display: none;
        }
        .cart-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 16px;
        }
        .cart-header h2 {
            font-size: 1.2rem;
        }
        .clear-cart-icon {
            background: #e2d4ca;
            border: none;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
        }
        .cart-item-card {
            background: rgba(255,250,240,0.9);
            border-radius: 20px;
            padding: 10px 12px;
            margin-bottom: 12px;
        }
        .cart-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 8px;
        }
        .cart-item-title {
            font-weight: 700;
            font-size: 0.8rem;
        }
        .cart-quantity {
            background: #efe3da;
            display: flex;
            gap: 6px;
            padding: 2px 10px;
            border-radius: 40px;
            align-items: center;
        }
        .cart-qty-btn {
            background: none;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            padding: 0 6px;
        }
        .remove-item-icon {
            background: none;
            border: none;
            font-size: 1rem;
            color: #b16e4a;
        }
        .cart-total-card {
            background: #e9ddd2;
            border-radius: 28px;
            padding: 10px 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            font-weight: 800;
            margin-top: 12px;
        }

        .floating-bottom-nav {
            position: fixed;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 30px);
            max-width: 500px;
            background: rgba(250, 245, 240, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 50px;
            display: flex;
            justify-content: space-around;
            padding: 6px 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            z-index: 40;
        }
        .nav-icon-btn {
            background: transparent;
            border: none;
            font-size: 0.7rem;
            color: #b38b6e;
            padding: 6px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .nav-icon-btn i {
            font-size: 1.2rem;
        }
        .nav-icon-btn.active {
            background: #e4d5c9;
            color: #7c5c44;
        }
        .badge-icon {
            background: #b17a58;
            color: white;
            border-radius: 40px;
            padding: 0px 6px;
            font-size: 0.6rem;
            margin-right: -5px;
        }

        .modal-order {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: 0.2s;
        }
        .modal-order.show {
            visibility: visible;
            opacity: 1;
        }
        .order-form {
            background: #fffcf7;
            width: 85%;
            max-width: 340px;
            border-radius: 36px;
            padding: 20px;
            box-shadow: 0 25px 35px rgba(0,0,0,0.2);
        }
        .order-form h3 {
            font-size: 1.2rem;
            margin-bottom: 15px;
        }
        .order-form input {
            width: 100%;
            padding: 10px 12px;
            margin-bottom: 12px;
            border: 1px solid #e0cfc0;
            border-radius: 40px;
            font-family: 'Tajawal';
            font-size: 0.85rem;
        }
        .order-form button {
            background: #25D366;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-top: 6px;
        }
        .close-order {
            background: #c9b6a6;
            margin-top: 8px;
        }
        .toast-msg {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d241fe6;
            color: #fff;
            padding: 6px 14px;
            border-radius: 60px;
            font-size: 0.7rem;
            z-index: 1100;
            opacity: 0;
            transition: 0.2s;
            pointer-events: none;
        }
        body.dark-mode {
            background: #251f1b;
        }
        body.dark-mode .prestige-card,
        body.dark-mode .cart-item-card,
        body.dark-mode .order-form {
            background: #322a25;
            color: #f0e2d8;
        }
        body.dark-mode .glass-navbar {
            background: rgba(30, 25, 21, 0.8);
        }
        body.dark-mode .full-whatsapp-btn {
            background: #075e5420;
            color: #8fcfb0;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="glass-navbar">
        <div class="brand">HIBE STORE</div>
        <button class="theme-icon-btn" id="darkModeBtn"><i class="bi bi-moon-stars"></i></button>
    </div>

    <div class="categories-row" id="filterRow"></div>

    <div id="homeGrid" class="products-grid"></div>
    <div id="cartPanel" class="cart-panel">
        <div class="cart-header">
            <h2><i class="bi bi-cart"></i> السلة</h2>
            <button id="clearCartBtn" class="clear-cart-icon"><i class="bi bi-trash3"></i> تفريغ</button>
        </div>
        <div id="cartList"></div>
        <div id="cartTotal" class="cart-total-card"></div>
    </div>
</div>

<div class="floating-bottom-nav">
    <button class="nav-icon-btn active" data-tab="home"><i class="bi bi-house-door"></i> الرئيسية</button>
    <button class="nav-icon-btn" data-tab="cart"><i class="bi bi-cart"></i> السلة <span id="cartBadgeFloat" class="badge-icon" style="display:none;">0</span></button>
</div>

<div id="toastMsg" class="toast-msg"></div>

<div id="orderModal" class="modal-order">
    <div class="order-form">
        <h3><i class="bi bi-whatsapp"></i> طلب المنتج</h3>
        <input type="text" id="orderName" placeholder="الاسم الكامل" required>
        <input type="text" id="orderAddress" placeholder="العنوان التفصيلي">
        <input type="tel" id="orderPhone" placeholder="رقم الجوال (للواتساب)" required>
        <input type="text" id="orderNotes" placeholder="ملاحظات إضافية (اختياري)">
        <button id="sendWhatsappBtn"><i class="bi bi-whatsapp"></i> إرسال الطلب</button>
        <button id="closeOrderModal" class="close-order">إلغاء</button>
    </div>
</div>

<script>
    // تحميل المنتجات من localStorage أو استخدام القيم الافتراضية (جميع التصنيفات)
    let products = [];
    let cart = [];
    let currentFilter = "all";
    let currentTab = "home";
    let pendingOrderData = null;

    const defaultProducts = [
        { id: 1, name: "قميص رجالي كلاسيك", category: "رجالي", price: 99, icon: "bi bi-shirt" },
        { id: 2, name: "فستان كتان أنيق", category: "نسائي", price: 149, icon: "bi bi-gender-female" },
        { id: 3, name: "طقم ولادي رياضي", category: "ولادي", price: 79, icon: "bi bi-emoji-smile" },
        { id: 4, name: "تنورة بناتي مكشكشة", category: "بناتي", price: 89, icon: "bi bi-suit-heart" },
        { id: 5, name: "حذاء رياضي جلد", category: "جزم", price: 199, icon: "bi bi-shoes" },
        { id: 6, name: "حقيبة ظهر جلدية", category: "شنط", price: 129, icon: "bi bi-bag" },
        { id: 7, name: "جاكيت جينز ثقيل", category: "جواكت", price: 189, icon: "bi bi-vest" },
        { id: 8, name: "تيشيرت صيفي قطني", category: "ملابس صيفية", price: 59, icon: "bi bi-sun" },
        { id: 9, name: "بنطلون كارجو عسكري", category: "رجالي", price: 119, icon: "bi bi-bag-plus" },
        { id: 10, name: "بلوزة شيفون شفاف", category: "نسائي", price: 109, icon: "bi bi-flower1" },
        { id: 11, name: "حذاء ولادي خفيف", category: "جزم", price: 99, icon: "bi bi-emoji-smile" },
        { id: 12, name: "شنطة كتف سهرة", category: "شنط", price: 159, icon: "bi bi-gem" },
        { id: 13, name: "جاكيت بومبر واقي", category: "جواكت", price: 229, icon: "bi bi-thermometer-snow" },
        { id: 14, name: "فستان صيفي طويل", category: "ملابس صيفية", price: 139, icon: "bi bi-brightness-alt-high" },
        { id: 15, name: "بدلة بناتي كتان", category: "بناتي", price: 129, icon: "bi bi-asterisk" },
        { id: 16, name: "طقم ولادي شتوي", category: "ولادي", price: 99, icon: "bi bi-snow2" }
    ];

    function loadProducts() {
        const stored = localStorage.getItem("hibe_products");
        if (stored) {
            products = JSON.parse(stored);
        } else {
            products = [...defaultProducts];
            localStorage.setItem("hibe_products", JSON.stringify(products));
        }
        // بناء شريط التصنيفات ديناميكياً من المنتجات الفعلية
        const categories = ["all", ...new Set(products.map(p => p.category))];
        const filterRow = document.getElementById("filterRow");
        filterRow.innerHTML = categories.map(cat => `<div class="chip-cat ${cat === 'all' ? 'active' : ''}" data-cat="${cat}">${cat === 'all' ? 'الكل' : cat}</div>`).join('');
        // إعادة ربط الأحداث
        document.querySelectorAll(".chip-cat").forEach(chip => {
            chip.addEventListener("click", () => {
                currentFilter = chip.dataset.cat;
                document.querySelectorAll(".chip-cat").forEach(c => c.classList.remove("active"));
                chip.classList.add("active");
                if (currentTab === 'home') renderHome();
                else setActiveTab('home');
            });
        });
        renderHome();
    }

    function saveProducts() {
        localStorage.setItem("hibe_products", JSON.stringify(products));
        loadProducts(); // إعادة تحميل لتحديث الشاشة
    }

    function showToast(msg) {
        const t = document.getElementById("toastMsg");
        t.innerText = msg;
        t.style.opacity = "1";
        setTimeout(() => t.style.opacity = "0", 1800);
    }

    function saveCart() {
        localStorage.setItem("hibe_cart", JSON.stringify(cart));
        updateBadge();
        if (currentTab === 'cart') renderCart();
    }

    function loadCart() {
        const saved = localStorage.getItem("hibe_cart");
        cart = saved ? JSON.parse(saved) : [];
        updateBadge();
        renderCart();
    }

    function updateBadge() {
        const total = cart.reduce((s, i) => s + i.qty, 0);
        const badge = document.getElementById("cartBadgeFloat");
        if (total > 0) {
            badge.style.display = "inline-block";
            badge.innerText = total > 9 ? "9+" : total;
        } else badge.style.display = "none";
    }

    function addToCart(pid, qty = 1) {
        const prod = products.find(p => p.id === pid);
        if (!prod) return;
        const existing = cart.find(i => i.id === pid);
        if (existing) existing.qty += qty;
        else cart.push({ id: pid, name: prod.name, price: prod.price, qty });
        saveCart();
        showToast(`✓ ${prod.name} أضيف للسلة`);
        if (currentTab === 'cart') renderCart();
    }

    function removeItem(pid) {
        cart = cart.filter(i => i.id !== pid);
        saveCart();
        if (currentTab === 'cart') renderCart();
    }

    function updateQty(pid, delta) {
        const item = cart.find(i => i.id === pid);
        if (item) {
            const newQ = item.qty + delta;
            if (newQ <= 0) removeItem(pid);
            else { item.qty = newQ; saveCart(); if (currentTab === 'cart') renderCart(); }
        }
    }

    function clearCart() {
        cart = [];
        saveCart();
        if (currentTab === 'cart') renderCart();
        showToast("تم تفريغ السلة");
    }

    function openOrderModal(orderData) {
        pendingOrderData = orderData;
        document.getElementById("orderModal").classList.add("show");
        document.getElementById("orderName").value = '';
        document.getElementById("orderAddress").value = '';
        document.getElementById("orderPhone").value = '';
        document.getElementById("orderNotes").value = '';
    }

    function sendWhatsAppOrder() {
        const name = document.getElementById("orderName").value.trim();
        const phone = document.getElementById("orderPhone").value.trim();
        if (!name || !phone) {
            showToast("يرجى إدخال الاسم ورقم الجوال");
            return;
        }
        const address = document.getElementById("orderAddress").value.trim() || "لم يحدد";
        const notes = document.getElementById("orderNotes").value.trim() || "بدون ملاحظات";

        let orderDetails = '';
        if (pendingOrderData && pendingOrderData.type === 'single') {
            const prod = pendingOrderData.product;
            orderDetails = `🛍️ المنتج: ${prod.name}\n💰 السعر: ${prod.price} ر.س\n📦 الكمية: ${prod.qty}\n💵 الإجمالي: ${(prod.price * prod.qty)} ر.س`;
        } else if (pendingOrderData && pendingOrderData.type === 'cart') {
            orderDetails = pendingOrderData.items.map(item => `${item.name} (${item.qty} × ${item.price} ر.س = ${item.price * item.qty} ر.س)`).join('\n');
            orderDetails += `\n🧾 الإجمالي الكلي: ${pendingOrderData.total} ر.س`;
        }

        const message = `🌿 *طلب جديد من HIBE STORE* 🌿\n\n👤 الاسم: ${name}\n📍 العنوان: ${address}\n📞 الجوال: ${phone}\n📝 ملاحظات: ${notes}\n\n📌 تفاصيل الطلب:\n${orderDetails}\n\n⏱️ يرجى تأكيد الطلب. شكراً لك!`;
        const encodedMsg = encodeURIComponent(message);
        const whatsappUrl = `https://wa.me/967730577358?text=${encodedMsg}`;
        window.open(whatsappUrl, '_blank');
        document.getElementById("orderModal").classList.remove("show");
        showToast("تم التوجيه إلى واتساب");
        pendingOrderData = null;
    }

    function renderHome() {
        const grid = document.getElementById("homeGrid");
        let filtered = currentFilter === "all" ? products : products.filter(p => p.category === currentFilter);
        if (filtered.length === 0) {
            grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:30px;">لا توجد منتجات في هذا التصنيف</div>`;
            return;
        }
        grid.innerHTML = filtered.map(prod => `
            <div class="prestige-card" data-id="${prod.id}">
                <div class="product-img"><i class="${prod.icon}"></i></div>
                <div class="product-info">
                    <div class="product-title">${prod.name}</div>
                    <div class="product-category">${prod.category}</div>
                    <div class="product-price">${prod.price} ر.س</div>
                    <div class="double-buttons">
                        <button class="icon-btn-sm addCartBtn" data-id="${prod.id}"><i class="bi bi-cart-plus"></i> سلة</button>
                        <button class="icon-btn-sm shareBtn" data-id="${prod.id}"><i class="bi bi-share"></i> مشاركة</button>
                    </div>
                    <button class="full-whatsapp-btn whatsapp-order-main" data-prod='${JSON.stringify({ id: prod.id, name: prod.name, price: prod.price, qty: 1 })}'><i class="bi bi-whatsapp"></i> طلب عبر واتساب</button>
                </div>
            </div>
        `).join('');

        document.querySelectorAll(".addCartBtn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                addToCart(parseInt(btn.dataset.id));
            });
        });
        document.querySelectorAll(".shareBtn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const id = parseInt(btn.dataset.id);
                const product = products.find(p => p.id === id);
                const url = `${window.location.href.split('?')[0]}?product=${id}`;
                navigator.clipboard.writeText(url);
                showToast(`📎 تم نسخ رابط ${product.name}`);
            });
        });
        document.querySelectorAll(".whatsapp-order-main").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const prodObj = JSON.parse(btn.dataset.prod);
                openOrderModal({ type: 'single', product: prodObj });
            });
        });
    }

    function renderCart() {
        const container = document.getElementById("cartList");
        const totalDiv = document.getElementById("cartTotal");
        if (cart.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:30px;">السلة فارغة</div>`;
            totalDiv.innerHTML = `<span>المجموع</span><span>0 ر.س</span>`;
            return;
        }
        let total = 0;
        let html = '';
        cart.forEach(item => {
            const itemTotal = item.price * item.qty;
            total += itemTotal;
            html += `
                <div class="cart-item-card">
                    <div class="cart-item-row">
                        <div><div class="cart-item-title">${item.name}</div><div>${item.price} ر.س × ${item.qty} = ${itemTotal} ر.س</div></div>
                        <div style="display: flex; gap: 8px; align-items: center;">
                            <div class="cart-quantity">
                                <button class="cart-qty-btn" data-id="${item.id}" data-delta="-1">-</button>
                                <span>${item.qty}</span>
                                <button class="cart-qty-btn" data-id="${item.id}" data-delta="1">+</button>
                            </div>
                            <button class="remove-item-icon" data-id="${item.id}"><i class="bi bi-trash3"></i></button>
                        </div>
                    </div>
                    <button class="full-whatsapp-btn cart-whatsapp-item" data-prod='${JSON.stringify({ id: item.id, name: item.name, price: item.price, qty: item.qty })}'><i class="bi bi-whatsapp"></i> طلب هذا المنتج عبر واتساب</button>
                </div>
            `;
        });
        container.innerHTML = html;
        totalDiv.innerHTML = `<span>الإجمالي الكلي: ${total} ر.س</span>
                              <button id="orderWholeCartBtn" class="full-whatsapp-btn"><i class="bi bi-whatsapp"></i> طلب السلة كاملة</button>`;

        document.querySelectorAll(".cart-qty-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                updateQty(parseInt(btn.dataset.id), parseInt(btn.dataset.delta));
            });
        });
        document.querySelectorAll(".remove-item-icon").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                removeItem(parseInt(btn.dataset.id));
            });
        });
        document.querySelectorAll(".cart-whatsapp-item").forEach(btn => {
            btn.addEventListener("click", (e) => {
                e.stopPropagation();
                const prodObj = JSON.parse(btn.dataset.prod);
                openOrderModal({ type: 'single', product: prodObj });
            });
        });
        const orderWholeBtn = document.getElementById("orderWholeCartBtn");
        if (orderWholeBtn) {
            orderWholeBtn.addEventListener("click", () => {
                const cartItems = cart.map(i => ({ name: i.name, price: i.price, qty: i.qty }));
                const cartTotal = cart.reduce((s,i)=> s + (i.price * i.qty), 0);
                openOrderModal({ type: 'cart', items: cartItems, total: cartTotal });
            });
        }
    }

    function setActiveTab(tab) {
        currentTab = tab;
        const homeDiv = document.getElementById("homeGrid");
        const cartDiv = document.getElementById("cartPanel");
        if (tab === 'home') {
            homeDiv.style.display = "grid";
            cartDiv.style.display = "none";
            renderHome();
        } else {
            homeDiv.style.display = "none";
            cartDiv.style.display = "block";
            renderCart();
        }
        document.querySelectorAll(".nav-icon-btn").forEach(btn => {
            if (btn.dataset.tab === tab) btn.classList.add("active");
            else btn.classList.remove("active");
        });
    }

    function setupDarkMode() {
        const darkBtn = document.getElementById("darkModeBtn");
        const isDark = localStorage.getItem("hibe_dark") === "true";
        if (isDark) document.body.classList.add("dark-mode");
        darkBtn.addEventListener("click", () => {
            document.body.classList.toggle("dark-mode");
            const dark = document.body.classList.contains("dark-mode");
            localStorage.setItem("hibe_dark", dark);
            darkBtn.innerHTML = dark ? '<i class="bi bi-brightness-high-fill"></i>' : '<i class="bi bi-moon-stars"></i>';
        });
        darkBtn.innerHTML = isDark ? '<i class="bi bi-brightness-high-fill"></i>' : '<i class="bi bi-moon-stars"></i>';
    }

    function init() {
        loadProducts();
        loadCart();
        setupDarkMode();
        document.querySelectorAll(".nav-icon-btn").forEach(btn => {
            btn.addEventListener("click", () => setActiveTab(btn.dataset.tab));
        });
        document.getElementById("clearCartBtn")?.addEventListener("click", clearCart);
        document.getElementById("sendWhatsappBtn").addEventListener("click", sendWhatsAppOrder);
        document.getElementById("closeOrderModal").addEventListener("click", () => {
            document.getElementById("orderModal").classList.remove("show");
            pendingOrderData = null;
        });
        window.addEventListener("click", (e) => {
            if (e.target === document.getElementById("orderModal")) {
                document.getElementById("orderModal").classList.remove("show");
                pendingOrderData = null;
            }
        });
    }
    init();
</script>
</body>
</html>
